<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인원관리 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">東南西北 · 관리자</p>
      <h1>인원관리</h1>
      <p id="subtitle">진행 대회의 참가 인원을 입력합니다.</p>
    </header>

    <section class="card">
      <div class="col-head" id="col-head"></div>
      <div id="rows"><div class="empty">불러오는 중…</div></div>
      <div style="padding:12px 14px;">
        <button class="btn btn-ghost" id="add" style="width:100%;">＋ 인원추가</button>
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="save">저장하기</button>
      <a class="btn btn-ghost" href="admin.html">관리자 메뉴</a>
    </div>
  </main>

  <script type="module">
    import { getActiveTournamentId, getTournament, updateParticipants, capacityLabel } from './store.js';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');

    const rowsEl = document.getElementById('rows');
    const colHead = document.getElementById('col-head');
    let t = null, isTeam = false;

    function rowHtml(p = { id: '', team: '' }) {
      if (isTeam) return `<div class="part-row team">
        <input type="text" data-role="id" placeholder="아이디" value="${p.id || ''}" />
        <input type="text" data-role="team" placeholder="팀" value="${p.team || ''}" /></div>`;
      return `<div class="part-row solo">
        <input type="text" data-role="id" placeholder="아이디" value="${p.id || ''}" /></div>`;
    }
    function addRow(p) { rowsEl.insertAdjacentHTML('beforeend', rowHtml(p)); }

    function collect() {
      const rows = [...rowsEl.querySelectorAll('.part-row')];
      const out = [];
      rows.forEach(r => {
        const id = r.querySelector('[data-role="id"]').value.trim();
        if (!id) return;
        if (isTeam) out.push({ id, team: r.querySelector('[data-role="team"]').value.trim() });
        else out.push({ id });
      });
      return out;
    }

    document.getElementById('add').addEventListener('click', () => {
      if (t.capacity && t.capacity > 0) {
        const current = rowsEl.querySelectorAll('.part-row').length;
        if (current >= t.capacity) { alert(`참가 인원(${t.capacity}명)을 초과할 수 없습니다.`); return; }
      }
      addRow();
    });

    document.getElementById('save').addEventListener('click', async () => {
      const list = collect();
      if (t.capacity && t.capacity > 0 && list.length > t.capacity) {
        alert(`참가 인원(${t.capacity}명)을 초과했습니다.`); return;
      }
      const btn = document.getElementById('save'); btn.disabled = true; btn.textContent = '저장 중…';
      try { await updateParticipants(t.id, list); alert('참가 인원이 저장되었습니다.'); location.href = 'admin.html'; }
      catch (e) { console.error(e); alert('저장 실패. Firebase 규칙을 확인해 주세요.'); btn.disabled = false; btn.textContent = '저장하기'; }
    });

    (async () => {
      const id = await getActiveTournamentId();
      t = id ? await getTournament(id) : null;
      if (!t) {
        document.getElementById('subtitle').textContent = '진행 중인 대회가 없습니다.';
        rowsEl.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>먼저 대회선택에서 진행 대회를 정하세요.</div>`;
        document.getElementById('add').disabled = true;
        document.getElementById('save').disabled = true;
        return;
      }
      isTeam = t.rule === 'team';
      document.getElementById('subtitle').textContent = `${t.name} · ${isTeam ? '팀전' : '개인전'} · 정원 ${capacityLabel(t.capacity)}`;
      colHead.style.gridTemplateColumns = isTeam ? '1fr 1fr' : '1fr';
      colHead.innerHTML = isTeam ? '<span>아이디</span><span>팀</span>' : '<span>아이디</span>';

      rowsEl.innerHTML = '';
      const existing = Array.isArray(t.participants) ? t.participants : [];
      if (existing.length > 0) {
        existing.forEach(p => addRow(p));
      } else {
        const n = (t.capacity && t.capacity > 0) ? t.capacity : 20; // 무제한이면 기본 20명
        for (let i = 0; i < n; i++) addRow();
      }
    })();
  </script>
</body>
</html>
