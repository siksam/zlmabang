<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상세 대회 정보</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=121" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 id="title">상세 대회 정보</h1>
      <p id="subtitle">대회 정보를 불러오는 중…</p>
      <p class="made-by">made by siksam</p>
    </header>

    <section class="card">
      <div class="card-head"><h2>안내</h2></div>
      <div id="body"><div class="empty">불러오는 중…</div></div>
    </section>

    <div class="actions"><a class="btn btn-ghost" href="index.html">점수판으로</a></div>
    <footer class="app-version">v1.2.1</footer>
  </main>

  <script type="module">
    import { onActiveTournament } from './store.js?v=121';

    const titleEl = document.getElementById('title');
    const subEl   = document.getElementById('subtitle');
    const bodyEl  = document.getElementById('body');

    onActiveTournament(t => {
      if (!t) {
        subEl.textContent = '진행 중인 대회가 없습니다.';
        bodyEl.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>관리자에서 대회를 선택하세요.</div>`;
        return;
      }
      titleEl.textContent = t.name;
      const rule = t.rule === 'team' ? '팀전' : '개인전';
      const time = t.timed ? `시간제(${t.minutes || 0}분)` : '시간제 없음';
      subEl.textContent = `${rule} · ${time} · ${t.uma1 ?? 0}/${t.uma2 ?? 0} · ${t.startDate} ~ ${t.endDate}`;

      const text = (t.info || '').trim();
      if (!text) {
        bodyEl.innerHTML = `<div class="empty"><strong>등록된 안내가 없어요</strong>관리자 → 상세 대회 정보 입력에서 작성할 수 있습니다.</div>`;
        return;
      }
      bodyEl.innerHTML = '<div class="info-text"></div>';
      bodyEl.querySelector('.info-text').textContent = text;
    });
  </script>
</body>
</html>
