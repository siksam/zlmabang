<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 · 마작 점수판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=105" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1>관리자 페이지</h1>
      <p id="sub">관리자 전용 영역입니다.</p>
      <p class="made-by">made by siksam</p>
    </header>

    <section class="card" id="gate">
      <div class="card-head"><h2>관리자 확인</h2></div>
      <div class="form-row" style="grid-template-columns: 1fr 120px;">
        <input type="password" id="gate-pw" placeholder="관리자 비밀번호" autocomplete="off" />
        <button class="btn btn-primary" id="gate-enter">입장</button>
      </div>
    </section>

    <div id="menu" style="display:none;">
      <div class="menu-grid">
        <a class="menu-item" href="admin-create.html">대회생성 <span class="arr">→</span></a>
        <a class="menu-item" href="admin-select.html">대회선택 <span class="arr">→</span></a>
        <a class="menu-item" href="admin-players.html">인원관리 <span class="arr">→</span></a>
        <a class="menu-item" href="admin-edit.html">기록수정 <span class="arr">→</span></a>
        <a class="menu-item" href="admin-sounds.html">알람음 관리 <span class="arr">→</span></a>
        <a class="menu-item" href="admin-past.html">지난대회기록 <span class="arr">→</span></a>
      </div>
    </div>

    <div class="actions"><a class="btn btn-ghost" href="index.html">점수판으로</a></div>
    <footer class="app-version">v1.0.5</footer>
  </main>

  <script type="module">
    import { checkAdminPassword, onActiveTournament } from './store.js?v=105';
    const gate = document.getElementById('gate');
    const menu = document.getElementById('menu');
    const sub  = document.getElementById('sub');

    function showMenu() {
      gate.style.display = 'none'; menu.style.display = 'block';
      onActiveTournament(t => { sub.textContent = t ? `현재 진행 대회: ${t.name}` : '진행 중인 대회가 없습니다.'; });
    }
    if (sessionStorage.getItem('admin_ok') === '1') showMenu();

    const pw = document.getElementById('gate-pw');
    function enter() {
      if (checkAdminPassword(pw.value)) { sessionStorage.setItem('admin_ok', '1'); showMenu(); }
      else { alert('비밀번호가 올바르지 않습니다.'); pw.value = ''; pw.focus(); }
    }
    document.getElementById('gate-enter').addEventListener('click', enter);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });
  </script>
</body>
</html>
