<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대회생성 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">관리자 페이지</p>
      <h1>대회생성</h1>
      <p>새 대회를 개최합니다.</p>
    </header>

    <section class="card">
      <div class="field">
        <label>대회명</label>
        <input type="text" id="name" placeholder="예: 2026 봄 정기대회" />
      </div>
      <div class="field">
        <label>규칙</label>
        <div class="row2">
          <div class="seg" id="seg-rule">
            <button data-v="individual" class="active">개인전</button>
            <button data-v="team">팀전</button>
          </div>
          <div class="inline-num" id="team-wrap" style="display:none;">
            <input type="number" id="teamcount" placeholder="팀 수" inputmode="numeric" />
            <span>팀</span>
          </div>
        </div>
      </div>
      <div class="field">
        <label>세부규칙</label>
        <div class="row2">
          <div class="seg" id="seg-timed">
            <button data-v="off" class="active">시간제 없음</button>
            <button data-v="on">시간제</button>
          </div>
          <div class="inline-num" id="min-wrap" style="display:none;">
            <input type="number" id="minutes" placeholder="분" inputmode="numeric" />
            <span>분</span>
          </div>
        </div>
      </div>

      <!-- 알람설정: 시간제일 때만 표시 -->
      <div class="field" id="alarm-field" style="display:none;">
        <label>알람설정 (종료 몇 분 전에 울릴지)</label>
        <div id="alarm-rows"></div>
        <button type="button" class="btn btn-ghost alarm-add" id="alarm-add" style="margin-top:8px;padding:8px 14px;">＋ 알람 추가</button>
        <p class="hint" style="margin:8px 2px 0;">예: 50분제에서 20·10·5분 전 → 시작 30·40·45분 후 알람</p>
        <p class="hint" style="margin:4px 2px 0;">※ 음성 알람은 크롬·사파리에서만 나옵니다(인앱 브라우저 ✕).</p>
      </div>

      <div class="field">
        <label>시작점수 / 반환점수 (미입력 시 25000)</label>
        <div class="row2">
          <div class="inline-num"><input type="number" id="startScore" value="25000" inputmode="numeric"><span>시작</span></div>
          <div class="inline-num"><input type="number" id="returnScore" value="25000" inputmode="numeric"><span>반환</span></div>
        </div>
      </div>
      <div class="field">
        <label>우마 (1·2등 / 3·4등은 자동 반전)</label>
        <div class="inline-num">
          <input type="number" id="uma1" value="15" inputmode="numeric" style="width:90px;">
          <span>/</span>
          <input type="number" id="uma2" value="5" inputmode="numeric" style="width:90px;">
        </div>
      </div>
      <div class="field">
        <label>기간 (날짜)</label>
        <div class="row2">
          <input type="date" id="start" />
          <span style="color:var(--muted);">~</span>
          <input type="date" id="end" />
        </div>
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="create">대회 만들기</button>
      <a class="btn btn-ghost" href="admin.html">관리자 메뉴</a>
    </div>
    <footer class="app-version">v1.0.4</footer>
  </main>

  <script type="module">
    import { createTournament, todayStr, addDaysStr, getSoundsOnce, allSounds, resolveSound } from './store.js';
    import { playSound, speakAlarm, unlockAudioOnGesture } from './audio.js';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');
    unlockAudioOnGesture();

    const state = { rule: 'individual', timed: 'off' };

    function bindSeg(id, key, after) {
      const seg = document.getElementById(id);
      seg.addEventListener('click', e => {
        const b = e.target.closest('button'); if (!b) return;
        seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        state[key] = b.dataset.v;
        if (after) after(b.dataset.v);
      });
    }
    bindSeg('seg-rule', 'rule', v => {
      document.getElementById('team-wrap').style.display = (v === 'team') ? 'flex' : 'none';
    });
    bindSeg('seg-timed', 'timed', v => {
      const on = v === 'on';
      document.getElementById('min-wrap').style.display = on ? 'flex' : 'none';
      document.getElementById('alarm-field').style.display = on ? 'block' : 'none';
    });

    // 알람 행 편집
    const alarmRows = document.getElementById('alarm-rows');
    let customSounds = [];
    function soundOptions(selId) {
      const tts = `<option value="tts" ${(!selId || selId === 'tts') ? 'selected' : ''}>음성 안내 (딩동댕+N분 남았습니다)</option>`;
      return tts + allSounds(customSounds).map(s => `<option value="${s.id}" ${s.id === selId ? 'selected' : ''}>${s.name}</option>`).join('');
    }
    function addAlarmRow(min = '', soundId = '') {
      const div = document.createElement('div');
      div.className = 'alarm-row';
      div.innerHTML = `<input type="number" class="alarm-min" inputmode="numeric" value="${min}" placeholder="분" style="width:70px;"><span>분 전</span>
        <span class="am-label">알람음</span>
        <select class="alarm-sound">${soundOptions(soundId)}</select>
        <button type="button" class="alarm-test">테스트</button>
        <button type="button" class="alarm-del" title="삭제">×</button>`;
      div.querySelector('.alarm-del').addEventListener('click', () => div.remove());
      div.querySelector('.alarm-test').addEventListener('click', () => {
        const v = div.querySelector('.alarm-sound').value;
        if (!v || v === 'tts') speakAlarm(20);
        else playSound(resolveSound(v, customSounds));
      });
      alarmRows.appendChild(div);
    }
    document.getElementById('alarm-add').addEventListener('click', () => addAlarmRow());
    (async () => { try { customSounds = await getSoundsOnce(); } catch (e) { console.error(e); } addAlarmRow(); })();

    function collectAlarms() {
      return [...alarmRows.querySelectorAll('.alarm-row')].map(r => ({
        min: Number(r.querySelector('.alarm-min').value),
        soundId: r.querySelector('.alarm-sound').value || null,
      })).filter(a => a.min > 0).sort((a, b) => b.min - a.min);
    }

    const today = todayStr();
    document.getElementById('start').value = today;
    document.getElementById('end').value = addDaysStr(today, 1);

    document.getElementById('create').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const start = document.getElementById('start').value;
      const end = document.getElementById('end').value;
      const isTeam = state.rule === 'team';
      const timed = state.timed === 'on';
      const minutes = timed ? Number(document.getElementById('minutes').value || 0) : null;
      const teamCount = isTeam ? Number(document.getElementById('teamcount').value || 0) : null;
      const startScore  = Number(document.getElementById('startScore').value)  || 25000;
      const returnScore = Number(document.getElementById('returnScore').value) || 25000;
      const uma1 = Number(document.getElementById('uma1').value) || 0;
      const uma2 = Number(document.getElementById('uma2').value) || 0;
      const alarms = timed ? collectAlarms() : [];

      if (!name) { alert('대회명을 입력하세요.'); return; }
      if (!start || !end) { alert('기간을 지정하세요.'); return; }
      if (end < start) { alert('종료일이 시작일보다 빠를 수 없습니다.'); return; }
      if (isTeam && (!teamCount || teamCount <= 0)) { alert('팀 수를 입력하세요.'); return; }
      if (timed) {
        if (!minutes || minutes <= 0) { alert('시간제 분을 입력하세요.'); return; }
        if (alarms.some(x => x.min >= minutes)) { alert('알람 시간은 시간제 시간보다 작아야 합니다.'); return; }
      }

      const btn = document.getElementById('create');
      btn.disabled = true; btn.textContent = '만드는 중…';
      try {
        await createTournament({
          name, rule: state.rule, teamCount, timed, minutes, alarms,
          startScore, returnScore, uma1, uma2,
          capacity: 0, startDate: start, endDate: end, participants: [],
        });
        alert(`‘${name}’ 대회가 생성되었습니다.\n‘대회선택’에서 진행 대회로 지정하세요.`);
        location.href = 'admin.html';
      } catch (e) { console.error(e); alert('생성 실패. Firebase 규칙을 확인해 주세요.'); btn.disabled = false; btn.textContent = '대회 만들기'; }
    });
  </script>
</body>
</html>
