<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기록수정 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">관리자 페이지</p>
      <h1>기록수정</h1>
      <p id="subtitle">기록을 불러오는 중…</p>
    </header>

    <section id="list"><div class="card"><div class="empty">불러오는 중…</div></div></section>
    <div class="actions"><a class="btn btn-ghost" href="admin.html">관리자 메뉴</a></div>
    <footer class="app-version">v1.0.0</footer>
  </main>

  <script type="module">
    import { SEATS, getActiveTournamentId, getTournament, getGamesByTournament,
             updateGame, deleteGame, rankWithinGame } from './store.js';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');

    const SEAT_META = { '동':{han:'東',cls:'east'}, '남':{han:'南',cls:'south'}, '서':{han:'西',cls:'west'}, '북':{han:'北',cls:'north'} };
    const params = new URLSearchParams(location.search);
    const list = document.getElementById('list');
    let tid = params.get('t');
    let games = [];
    const editing = new Set(); // gameId 편집 중

    function fmtTime(ts) { try { const d = ts && ts.toDate ? ts.toDate() : null;
      return d ? d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '방금'; } catch(e){ return ''; } }

    function viewRows(g) {
      const ranks = rankWithinGame(g.rows);
      return g.rows.map(r => {
        const m = SEAT_META[r.pos] || { han:'', cls:'' };
        const rk = ranks.get(r);
        const rkHtml = rk ? `<span class="rank r${rk<=3?rk:''}">${rk}</span>` : '–';
        const id = r.id ? r.id : '<span class="id-empty">미입력</span>';
        const sc = (r.score===null||r.score==='') ? '<span class="id-empty">–</span>' : Number(r.score).toLocaleString('ko-KR');
        return `<tr><td style="width:44px">${rkHtml}</td>
          <td><span class="seat seat-${m.cls}"><span class="dot"></span>${m.han} ${r.pos}</span></td>
          <td>${id}</td><td class="num">${sc}</td></tr>`;
      }).join('');
    }

    function editRows(g) {
      return g.rows.map((r, i) => {
        const opts = SEATS.map(s => `<option value="${s.pos}" ${s.pos===r.pos?'selected':''}>${s.hanja} ${s.pos}</option>`).join('');
        return `<div class="edit-row">
          <select data-g="${g.id}" data-i="${i}" data-f="pos">${opts}</select>
          <input type="text" data-g="${g.id}" data-i="${i}" data-f="id" value="${r.id || ''}" placeholder="아이디" />
          <input type="number" data-g="${g.id}" data-i="${i}" data-f="score" value="${(r.score===null||r.score==='')?'':r.score}" placeholder="점수" />
        </div>`;
      }).join('');
    }

    function render() {
      if (games.length === 0) { list.innerHTML = `<div class="card"><div class="empty"><strong>기록 없음</strong>이 대회에 저장된 경기가 없습니다.</div></div>`; return; }
      const total = games.length;
      list.innerHTML = games.map((g, idx) => {
        const isEdit = editing.has(g.id);
        const body = isEdit
          ? editRows(g) + `<div style="padding:10px 8px;display:flex;gap:8px;">
              <button class="btn btn-primary" data-act="savegame" data-id="${g.id}" style="padding:8px 16px;">저장</button>
              <button class="btn btn-ghost" data-act="cancel" data-id="${g.id}" style="padding:8px 16px;">취소</button></div>`
          : `<table class="mini"><tbody>${viewRows(g)}</tbody></table>`;
        const edBtns = isEdit ? '' : `<span class="ed">
            <button data-act="edit" data-id="${g.id}" title="수정">E</button>
            <button class="del" data-act="del" data-id="${g.id}" title="삭제">D</button></span>`;
        return `<div class="record-card">
          <div class="record-head"><span class="game-no">${total-idx}번째 경기 <span class="when">${fmtTime(g.createdAt)}</span></span>${edBtns}</div>
          ${body}</div>`;
      }).join('');
      bind();
    }

    function bind() {
      list.querySelectorAll('button[data-act]').forEach(b => b.addEventListener('click', () => handle(b.dataset.act, b.dataset.id)));
    }

    async function handle(act, id) {
      if (act === 'edit') { editing.add(id); render(); return; }
      if (act === 'cancel') { editing.delete(id); render(); return; }
      if (act === 'del') {
        if (!confirm('이 경기 기록을 삭제할까요?')) return;
        try { await deleteGame(id); alert('기록이 삭제되었습니다.'); await load(); } catch(e){ console.error(e); alert('삭제 실패.'); }
        return;
      }
      if (act === 'savegame') {
        const g = games.find(x => x.id === id);
        const newRows = g.rows.map((r, i) => {
          const get = f => list.querySelector(`[data-g="${id}"][data-i="${i}"][data-f="${f}"]`);
          const pos = get('pos').value;
          const idv = get('id').value.trim();
          const sv = get('score').value;
          return { pos, id: idv, score: sv === '' ? null : Number(sv) };
        });
        try { await updateGame(id, newRows); editing.delete(id); alert('기록이 수정되었습니다.'); await load(); }
        catch(e){ console.error(e); alert('저장 실패.'); }
      }
    }

    async function load() {
      games = await getGamesByTournament(tid);
      render();
    }

    (async () => {
      if (!tid) tid = await getActiveTournamentId();
      const t = tid ? await getTournament(tid) : null;
      if (!t) {
        document.getElementById('subtitle').textContent = '진행 중인 대회가 없습니다.';
        list.innerHTML = `<div class="card"><div class="empty"><strong>진행 중인 대회 없음</strong>대회선택에서 진행 대회를 정하거나, 지난대회기록에서 대회를 고르세요.</div></div>`;
        return;
      }
      document.getElementById('subtitle').textContent = `${t.name} · 기록을 수정/삭제할 수 있습니다 (E: 수정, D: 삭제)`;
      await load();
    })();
  </script>
</body>
</html>
