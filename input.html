<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점수입력 · 마작 점수판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=122" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 id="title">점수입력</h1>
      <p id="subtitle">진행 대회를 불러오는 중…</p>
      <p class="made-by">made by siksam</p>
    </header>

    <section class="card">
      <div class="col-head"><span>위치</span><span>아이디</span><span style="text-align:right">점수</span></div>
      <div id="rows"><div class="empty">불러오는 중…</div></div>
      <div class="sum-line">
        <button class="btn btn-ghost" id="auto-calc" type="button">점수 자동계산</button>
        <span id="sum-text"></span>
      </div>
    </section>

    <p class="note">아이디는 칸에 직접 입력하거나 목록에서 고를 수 있습니다. 팀전은 팀별로 구분되어 표시됩니다.</p>

    <div class="actions">
      <button class="btn btn-primary" id="save">저장하기</button>
      <a class="btn btn-ghost" href="index.html">돌아가기</a>
    </div>
    <footer class="app-version">v1.3.0</footer>
  </main>

  <script type="module">
    import { SEATS, getActiveTournamentId, getTournament, addGame } from './store.js?v=122';

    const SEAT_CLS = { '동': 'east', '남': 'south', '서': 'west', '북': 'north' };
    const rowsEl = document.getElementById('rows');
    const sumLine = document.getElementById('sum-text');
    const saveBtn = document.getElementById('save');
    let curT = null, expectedSum = 100000;

    // 참가자를 팀별로 묶고 팀 색을 배정 (개인전이면 그룹 없이 전체 목록)
    const TEAM_BG = ['#eef5ef','#fdeeec','#fbf4e6','#eceff7','#f2edf7','#eaf4f3','#f6f1ea','#edf6ee','#f7eef3','#eef3f7'];
    const TEAM_LINE = ['#1B7A5A','#C0392B','#C28A2C','#3B4A66','#7F77DD','#1D9E75','#B08D4A','#639922','#D4537E','#378ADD'];
    let groups = [];   // [{team, color, line, ids:[]}]

    function buildGroups(t) {
      const list = (t && Array.isArray(t.participants)) ? t.participants : [];
      if (!t || t.rule !== 'team') {
        groups = [{ team: null, color: '', line: '', ids: list.map(p => p.id).filter(Boolean) }];
        return;
      }
      const map = new Map();
      list.forEach(p => {
        if (!p || !p.id) return;
        const tm = (p.team || '').trim() || '(미지정)';
        if (!map.has(tm)) map.set(tm, []);
        map.get(tm).push(p.id);
      });
      groups = [...map.entries()].map(([team, ids], i) => ({
        team, ids, color: TEAM_BG[i % TEAM_BG.length], line: TEAM_LINE[i % TEAM_LINE.length],
      }));
    }

    function buildRows() {
      rowsEl.innerHTML = SEATS.map((seat, i) => `
        <div class="form-row">
          <span class="seat-badge seat-${SEAT_CLS[seat.pos]}"><span class="han">${seat.hanja}</span>${seat.pos}</span>
          <div class="idpick">
            <input type="text" placeholder="아이디 입력 또는 선택" data-role="id" data-i="${i}" autocomplete="off" />
            <span class="idpick-arrow" aria-hidden="true">▾</span>
            <div class="idpick-list" data-list="${i}" hidden></div>
          </div>
          <input type="number" placeholder="점수" inputmode="numeric" step="100" data-role="score" />
        </div>`).join('');
      rowsEl.querySelectorAll('[data-role="score"]').forEach(inp => inp.addEventListener('input', updateSum));
      rowsEl.querySelectorAll('[data-role="id"]').forEach(setupPicker);
      updateSum();
    }

    // 팀별 구분 드롭다운
    function setupPicker(input) {
      const box = rowsEl.querySelector(`[data-list="${input.dataset.i}"]`);
      function render() {
        const q = input.value.trim();
        let html = '';
        groups.forEach(g => {
          const hits = g.ids.filter(id => !q || id.includes(q));
          if (!hits.length) return;
          if (g.team) html += `<div class="idpick-head" style="background:${g.color}">${g.team}</div>`;
          hits.forEach(id => {
            html += `<div class="idpick-item" data-id="${id}"${g.line ? ` style="border-left-color:${g.line}"` : ''}>${id}</div>`;
          });
        });
        box.innerHTML = html || '<div class="idpick-empty">일치하는 아이디 없음</div>';
      }
      function open() { render(); box.hidden = false; }
      function close() { box.hidden = true; }
      input.addEventListener('focus', open);
      input.addEventListener('input', open);
      input.addEventListener('blur', () => setTimeout(close, 150));
      function pick(e) {
        const it = e.target.closest('.idpick-item');
        if (!it) return;
        e.preventDefault();
        input.value = it.dataset.id;
        close();
      }
      box.addEventListener('mousedown', pick);
      box.addEventListener('touchstart', pick, { passive: false });
    }
    function currentSum() {
      return [...document.querySelectorAll('[data-role="score"]')]
        .reduce((s, el) => s + (el.value === '' ? 0 : Number(el.value)), 0);
    }
    function updateSum() {
      const sum = currentSum();
      const ok = sum === expectedSum;
      sumLine.innerHTML = `합계 <b class="${ok ? 'ok' : 'bad'}">${sum.toLocaleString('ko-KR')}</b> / ${expectedSum.toLocaleString('ko-KR')}`;
    }

    // 3명 입력 시 나머지 1명 자동 계산
    function autoCalc() {
      const inputs = [...document.querySelectorAll('[data-role="score"]')];
      const empty = inputs.filter(i => i.value.trim() === '');
      if (empty.length !== 1) {
        alert('4명 중 3명의 점수가 입력된 상태에서 사용하세요.');
        return;
      }
      const filled = inputs.filter(i => i.value.trim() !== '')
                           .reduce((s, i) => s + Number(i.value), 0);
      empty[0].value = expectedSum - filled;
      updateSum();
    }

    async function save() {
      if (!curT) { alert('진행 중인 대회가 없습니다.'); return; }
      const ids = [...document.querySelectorAll('[data-role="id"]')];
      const scores = [...document.querySelectorAll('[data-role="score"]')];
      const result = SEATS.map((seat, i) => ({
        pos: seat.pos, id: ids[i].value.trim(),
        score: scores[i].value === '' ? null : Number(scores[i].value),
      }));

      // 아이디가 하나라도 비어 있으면 저장 불가
      if (result.some(r => !r.id)) { alert('아이디가 입력되지 않았습니다. 확인해주세요'); return; }
      // 합계가 맞지 않으면 저장 불가
      const sum = result.reduce((s, r) => s + (r.score == null || Number.isNaN(r.score) ? NaN : r.score), 0);
      if (Number.isNaN(sum) || sum !== expectedSum) { alert('합계점수가 맞지 않습니다. 확인해주세요.'); return; }

      saveBtn.disabled = true; saveBtn.textContent = '저장 중…';
      try { await addGame(curT.id, result); alert('점수가 저장되었습니다.'); window.location.href = 'index.html'; }
      catch (e) { console.error(e); alert('저장 실패. Firebase 설정/규칙을 확인해 주세요.'); saveBtn.disabled = false; saveBtn.textContent = '저장하기'; }
    }

    (async () => {
      const id = await getActiveTournamentId();
      curT = id ? await getTournament(id) : null;
      if (!curT) {
        document.getElementById('subtitle').textContent = '진행 중인 대회가 없습니다. 관리자에서 대회를 선택하세요.';
        rowsEl.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>먼저 관리자 → 대회선택에서 대회를 정하세요.</div>`;
        saveBtn.disabled = true;
        return;
      }
      expectedSum = 4 * (curT.startScore != null ? Number(curT.startScore) : 25000);
      document.getElementById('title').textContent = curT.name;
      document.getElementById('subtitle').textContent = `한 경기 결과를 입력하면 이 대회에 추가됩니다. (합계 ${expectedSum.toLocaleString('ko-KR')})`;
      buildGroups(curT);
      buildRows();
      document.getElementById('auto-calc').addEventListener('click', autoCalc);
      saveBtn.addEventListener('click', save);
    })();
  </script>
</body>
</html>
