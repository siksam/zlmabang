<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대회선택 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=121" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">관리자 페이지</p>
      <h1>대회선택</h1>
      <p>진행 중(종료일이 지나지 않은)인 대회 목록입니다. 선택·변경·삭제할 수 있어요.</p>
    </header>

    <section id="list"><div class="card"><div class="empty">불러오는 중…</div></div></section>
    <div class="actions"><a class="btn btn-ghost" href="admin.html">관리자 메뉴</a></div>
    <footer class="app-version">v1.2.1</footer>
  </main>

  <script type="module">
    import { onTournaments, isOngoing, setActiveTournament, getActiveTournamentId,
             updateTournament, deleteTournament, ruleLabel,
             getSoundsOnce, allSounds, resolveSound, normalizeAlarms } from './store.js?v=121';
    import { playSound, speakAlarm, unlockAudioOnGesture } from './audio.js?v=121';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');
    unlockAudioOnGesture();
    let customSounds = [];

    const list = document.getElementById('list');
    let activeId = null;
    let all = [];
    let editId = null;

    async function refreshActive() { activeId = await getActiveTournamentId(); }

    function soundOptions(selId) {
      const tts = `<option value="tts" ${(!selId || selId === 'tts') ? 'selected' : ''}>음성 안내 (딩동댕+N분 남았습니다)</option>`;
      return tts + allSounds(customSounds).map(s => `<option value="${s.id}" ${s.id === selId ? 'selected' : ''}>${s.name}</option>`).join('');
    }
    const alarmRowHtml = a => `<div class="alarm-row"><input type="number" class="alarm-min" value="${a.min || ''}" placeholder="분" style="width:70px;"><span>분 전</span><span class="am-label">알람음</span><select class="alarm-sound">${soundOptions(a.soundId)}</select><button type="button" class="alarm-test">테스트</button><button type="button" class="alarm-del">×</button></div>`;

    function editPanel(t) {
      const alarms = normalizeAlarms(t.alarms);
      return `<div class="edit-panel">
        <div class="ef"><label>대회명</label><input type="text" data-ef="name" value="${t.name}"></div>
        <div class="ef"><label>규칙</label>
          <select data-ef="rule">
            <option value="individual" ${t.rule !== 'team' ? 'selected' : ''}>개인전</option>
            <option value="team" ${t.rule === 'team' ? 'selected' : ''}>팀전</option>
          </select>
          <input type="number" data-ef="teamCount" value="${t.teamCount || ''}" placeholder="팀 수" style="width:90px;">
        </div>
        <div class="ef"><label>시간제</label>
          <select data-ef="timed">
            <option value="off" ${!t.timed ? 'selected' : ''}>없음</option>
            <option value="on" ${t.timed ? 'selected' : ''}>시간제</option>
          </select>
          <input type="number" data-ef="minutes" value="${t.minutes || ''}" placeholder="분" style="width:90px;">
        </div>
        <div class="ef" data-alarmwrap style="display:${t.timed ? 'flex' : 'none'};align-items:flex-start;">
          <label>알람</label>
          <div style="flex:1;">
            <div data-alarmrows>${alarms.map(alarmRowHtml).join('')}</div>
            <button type="button" class="btn btn-ghost alarm-add-edit" style="padding:6px 12px;margin-top:6px;">＋ 알람 추가</button>
          </div>
        </div>
        <div class="ef"><label>시작/반환</label>
          <input type="number" data-ef="startScore" value="${t.startScore ?? 25000}" placeholder="시작" style="width:90px;">
          <input type="number" data-ef="returnScore" value="${t.returnScore ?? 25000}" placeholder="반환" style="width:90px;">
        </div>
        <div class="ef"><label>우마</label>
          <input type="number" data-ef="uma1" value="${t.uma1 ?? ''}" placeholder="1·2등" style="width:90px;"> /
          <input type="number" data-ef="uma2" value="${t.uma2 ?? ''}" placeholder="3·4등" style="width:90px;">
        </div>
        <div class="ef"><label>기간</label>
          <input type="date" data-ef="startDate" value="${t.startDate}"> ~
          <input type="date" data-ef="endDate" value="${t.endDate}">
        </div>
        <div style="display:flex;gap:8px;padding:8px 0;">
          <button class="btn btn-primary" data-act="savemeta" data-id="${t.id}" style="padding:8px 16px;">저장</button>
          <button class="btn btn-ghost" data-act="canceledit" data-id="${t.id}" style="padding:8px 16px;">취소</button>
        </div>
      </div>`;
    }

    function render() {
      const items = all.filter(isOngoing);
      if (items.length === 0) { list.innerHTML = `<div class="card"><div class="empty"><strong>진행 중인 대회가 없어요</strong>‘대회생성’에서 먼저 만드세요.</div></div>`; return; }
      list.innerHTML = items.map(t => `
        <div class="record-card">
          <div class="record-head">
            <span class="game-no">${t.name}${t.id === activeId ? ' <span class="badge-now">진행중</span>' : ''}</span>
            <span class="ed">
              <button class="${t.id === activeId ? '' : 'sel'}" data-act="select" data-id="${t.id}" data-name="${t.name}" title="진행 대회로 선택">${t.id === activeId ? '✓ 선택중' : '선택'}</button>
              <button data-act="editmeta" data-id="${t.id}" title="정보 변경">변경</button>
              <button class="del" data-act="del" data-id="${t.id}" title="대회 삭제">삭제</button>
            </span>
          </div>
          <div class="meta-line">${t.startDate} ~ ${t.endDate} · ${ruleLabel(t)}</div>
          ${editId === t.id ? editPanel(t) : ''}
        </div>`).join('');
      bind();
      bindAlarmEditor();
    }

    function bind() {
      list.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', () => handle(b.dataset.act, b.dataset.id, b.dataset.name)));
    }

    // 변경 패널 내 알람 추가/삭제/시간제 토글
    function bindAlarmEditor() {
      if (editId === null) return;
      const timedSel = list.querySelector('[data-ef="timed"]');
      const wrap = list.querySelector('[data-alarmwrap]');
      const rows = list.querySelector('[data-alarmrows]');
      if (timedSel && wrap) {
        const sync = () => { wrap.style.display = timedSel.value === 'on' ? 'flex' : 'none'; };
        timedSel.addEventListener('change', sync); sync();
      }
      list.querySelectorAll('[data-alarmrows] .alarm-del').forEach(b => b.addEventListener('click', () => b.closest('.alarm-row').remove()));
      list.querySelectorAll('[data-alarmrows] .alarm-test').forEach(b => b.addEventListener('click', () => {
        const v = b.closest('.alarm-row').querySelector('.alarm-sound').value;
        if (!v || v === 'tts') speakAlarm(20);
        else playSound(resolveSound(v, customSounds));
      }));
      const addBtn = list.querySelector('.alarm-add-edit');
      if (addBtn && rows) addBtn.addEventListener('click', () => {
        const div = document.createElement('div');
        div.className = 'alarm-row';
        div.innerHTML = `<input type="number" class="alarm-min" placeholder="분" style="width:70px;"><span>분 전</span><span class="am-label">알람음</span><select class="alarm-sound">${soundOptions('')}</select><button type="button" class="alarm-test">테스트</button><button type="button" class="alarm-del">×</button>`;
        div.querySelector('.alarm-del').addEventListener('click', () => div.remove());
        div.querySelector('.alarm-test').addEventListener('click', () => {
          const v = div.querySelector('.alarm-sound').value;
          if (!v || v === 'tts') speakAlarm(20);
          else playSound(resolveSound(v, customSounds));
        });
        rows.appendChild(div);
      });
    }

    async function handle(act, id, name) {
      if (act === 'select') {
        try { await setActiveTournament(id); await refreshActive(); alert(`‘${name}’ 대회가 진행 상태로 설정되었습니다.`); render(); }
        catch (e) { console.error(e); alert('설정 실패. Firebase 규칙을 확인해 주세요.'); }
        return;
      }
      if (act === 'editmeta') { editId = (editId === id) ? null : id; render(); return; }
      if (act === 'canceledit') { editId = null; render(); return; }
      if (act === 'del') {
        const t = all.find(x => x.id === id);
        if (!confirm(`‘${t.name}’ 대회와 그 모든 경기 기록을 삭제할까요? 되돌릴 수 없습니다.`)) return;
        try { await deleteTournament(id); alert('대회가 삭제되었습니다.'); } catch (e) { console.error(e); alert('삭제 실패.'); }
        return;
      }
      if (act === 'savemeta') {
        const get = f => list.querySelector(`[data-ef="${f}"]`);
        const nm = get('name').value.trim();
        const rule = get('rule').value;
        const timed = get('timed').value === 'on';
        const minutes = timed ? Number(get('minutes').value || 0) : null;
        const teamCount = rule === 'team' ? Number(get('teamCount').value || 0) : null;
        const startScore  = Number(get('startScore').value)  || 25000;
        const returnScore = Number(get('returnScore').value) || 25000;
        const uma1 = Number(get('uma1').value) || 0;
        const uma2 = Number(get('uma2').value) || 0;
        const startDate = get('startDate').value;
        const endDate = get('endDate').value;
        const alarms = timed
          ? [...list.querySelectorAll('[data-alarmrows] .alarm-row')].map(r => ({
              min: Number(r.querySelector('.alarm-min').value),
              soundId: r.querySelector('.alarm-sound').value || null,
            })).filter(a => a.min > 0).sort((a, b) => b.min - a.min)
          : [];

        if (!nm) { alert('대회명을 입력하세요.'); return; }
        if (!startDate || !endDate) { alert('기간을 지정하세요.'); return; }
        if (endDate < startDate) { alert('종료일이 시작일보다 빠를 수 없습니다.'); return; }
        if (rule === 'team' && (!teamCount || teamCount <= 0)) { alert('팀 수를 입력하세요.'); return; }
        if (timed) {
          if (!minutes || minutes <= 0) { alert('시간제 분을 입력하세요.'); return; }
          if (alarms.some(x => x.min >= minutes)) { alert('알람 시간은 시간제 시간보다 작아야 합니다.'); return; }
        }

        try { await updateTournament(id, { name: nm, rule, teamCount, timed, minutes, alarms, startScore, returnScore, uma1, uma2, startDate, endDate }); editId = null; alert('대회 정보가 수정되었습니다.'); }
        catch (e) { console.error(e); alert('저장 실패.'); }
      }
    }

    (async () => {
      try { customSounds = await getSoundsOnce(); } catch (e) { console.error(e); }
      await refreshActive();
      onTournaments(l => { all = l; render(); });
    })();
  </script>
</body>
</html>
