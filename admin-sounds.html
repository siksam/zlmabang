<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알람음 관리 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">관리자 페이지</p>
      <h1>알람음 관리</h1>
      <p>가지고 있는 음원 파일을 올려 알람음으로 씁니다. 올린 소리는 알람설정에서 고를 수 있어요.</p>
    </header>

    <!-- 음원 업로드 -->
    <section class="card">
      <div class="card-head"><h2>알람음 업로드</h2></div>
      <div class="field"><label>이름</label><input type="text" id="s-name" placeholder="예: 공지 벨"></div>
      <div class="field">
        <label>음원 파일 (mp3 · wav 등, 약 700KB 이하의 짧은 소리 권장)</label>
        <input type="file" id="s-file" accept="audio/*" />
        <p class="hint" id="file-info" style="margin:8px 2px 0;"></p>
      </div>
      <div style="padding:12px 14px;display:flex;gap:8px;">
        <button class="btn btn-ghost" id="s-test">테스트</button>
        <button class="btn btn-primary" id="s-save">저장</button>
      </div>
    </section>

    <!-- 목록 -->
    <section class="card">
      <div class="card-head"><h2>알람음 목록</h2></div>
      <div id="list"><div class="empty">불러오는 중…</div></div>
    </section>

    <div class="actions"><a class="btn btn-ghost" href="admin.html">관리자 메뉴</a></div>
    <footer class="app-version">v1.0.0</footer>
  </main>

  <script type="module">
    import { builtinSounds, onSounds, createSound, deleteSound } from './store.js';
    import { playSound, unlockAudioOnGesture } from './audio.js';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');
    unlockAudioOnGesture();

    const MAX_BYTES = 700 * 1024; // 약 700KB
    const listEl = document.getElementById('list');
    const nameEl = document.getElementById('s-name');
    const fileEl = document.getElementById('s-file');
    const fileInfo = document.getElementById('file-info');
    let pendingDataUrl = null;

    fileEl.addEventListener('change', () => {
      pendingDataUrl = null; fileInfo.textContent = '';
      const f = fileEl.files[0];
      if (!f) return;
      if (f.size > MAX_BYTES) {
        fileInfo.textContent = `파일이 너무 큽니다 (${Math.round(f.size / 1024)}KB). 약 700KB 이하의 짧은 음원을 사용하세요.`;
        fileEl.value = ''; return;
      }
      if (!nameEl.value.trim()) nameEl.value = f.name.replace(/\.[^.]+$/, '');
      const reader = new FileReader();
      reader.onload = () => { pendingDataUrl = reader.result; fileInfo.textContent = `${f.name} · ${Math.round(f.size / 1024)}KB — 준비됨`; };
      reader.onerror = () => { fileInfo.textContent = '파일을 읽지 못했습니다.'; };
      reader.readAsDataURL(f);
    });

    document.getElementById('s-test').addEventListener('click', () => {
      if (!pendingDataUrl) { alert('먼저 음원 파일을 선택하세요.'); return; }
      playSound({ dataUrl: pendingDataUrl });
    });

    document.getElementById('s-save').addEventListener('click', async () => {
      const name = nameEl.value.trim();
      if (!name) { alert('이름을 입력하세요.'); return; }
      if (!pendingDataUrl) { alert('음원 파일을 선택하세요.'); return; }
      const btn = document.getElementById('s-save'); btn.disabled = true; btn.textContent = '저장 중…';
      try {
        await createSound({ name, dataUrl: pendingDataUrl });
        nameEl.value = ''; fileEl.value = ''; pendingDataUrl = null; fileInfo.textContent = '';
        alert('알람음이 저장되었습니다.');
      } catch (e) { console.error(e); alert('저장 실패. 파일이 너무 크거나 Firebase 규칙 문제일 수 있습니다.'); }
      btn.disabled = false; btn.textContent = '저장';
    });

    let custom = [];
    function render() {
      const builtins = builtinSounds();
      const row = (s, canDelete) => `<div class="record-card" style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;">
        <span><b>${s.name}</b> <span class="meta-line">${s.dataUrl ? '업로드 음원' : '기본 제공'}</span></span>
        <span class="ed">
          <button data-act="test" data-id="${s.id}">테스트</button>
          ${canDelete ? `<button class="del" data-act="del" data-id="${s.id}">삭제</button>` : ''}
        </span></div>`;
      listEl.innerHTML =
        `<div class="subhead" style="padding-left:6px;">내가 올린 알람음</div>` +
        (custom.length ? custom.map(s => row(s, true)).join('') : `<div class="empty">아직 올린 알람음이 없어요.</div>`) +
        `<div class="subhead" style="padding-left:6px;">기본 제공</div>` +
        builtins.map(s => row(s, false)).join('');

      listEl.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', async () => {
        const s = [...builtins, ...custom].find(x => x.id === b.dataset.id);
        if (b.dataset.act === 'test') { playSound(s); }
        else if (b.dataset.act === 'del') {
          if (!confirm(`‘${s.name}’ 알람음을 삭제할까요?`)) return;
          try { await deleteSound(b.dataset.id); alert('알람음이 삭제되었습니다.'); } catch (e) { console.error(e); alert('삭제 실패.'); }
        }
      }));
    }
    onSounds(l => { custom = l; render(); });
  </script>
</body>
</html>
