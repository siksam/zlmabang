<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상세 대회 정보 입력 · 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=122" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">관리자 페이지</p>
      <h1>상세 대회 정보 입력</h1>
      <p id="subtitle">진행 중인 대회의 안내문을 작성합니다.</p>
      <p class="made-by">made by siksam</p>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>안내문</h2>
        <span class="hint">줄바꿈은 그대로 표시됩니다</span>
      </div>
      <div style="padding:12px 14px;">
        <textarea id="info" class="info-input" placeholder="예)&#10;· 대회 규칙: 3인 이상 참가 시 진행&#10;· 상금: 1위 5만원&#10;· 문의: 식샘"></textarea>
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="save">저장하기</button>
      <a class="btn btn-ghost" href="admin.html">관리자 메뉴</a>
    </div>
    <footer class="app-version">v1.3.0</footer>
  </main>

  <script type="module">
    import { getActiveTournamentId, getTournament, updateTournament } from './store.js?v=122';
    if (sessionStorage.getItem('admin_ok') !== '1') location.replace('admin.html');

    const ta = document.getElementById('info');
    const saveBtn = document.getElementById('save');
    let tid = null;

    saveBtn.addEventListener('click', async () => {
      if (!tid) { alert('진행 중인 대회가 없습니다.'); return; }
      saveBtn.disabled = true; saveBtn.textContent = '저장 중…';
      try {
        await updateTournament(tid, { info: ta.value });
        alert('상세 대회 정보가 저장되었습니다.');
        location.href = 'admin.html';
      } catch (e) {
        console.error(e); alert('저장 실패. Firebase 규칙을 확인해 주세요.');
        saveBtn.disabled = false; saveBtn.textContent = '저장하기';
      }
    });

    (async () => {
      tid = await getActiveTournamentId();
      const t = tid ? await getTournament(tid) : null;
      if (!t) {
        document.getElementById('subtitle').textContent = '진행 중인 대회가 없습니다. 먼저 대회선택에서 지정하세요.';
        ta.disabled = true; saveBtn.disabled = true;
        return;
      }
      document.getElementById('subtitle').textContent = `${t.name} · 이 대회의 안내문을 작성합니다.`;
      ta.value = t.info || '';
    })();
  </script>
</body>
</html>
