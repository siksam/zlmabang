<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마작 점수판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">東南西北 · 누적 점수판</p>
      <h1 id="title">마작 점수판</h1>
      <p id="subtitle">진행 중인 대회를 불러오는 중…</p>
      <div class="tiles" aria-hidden="true">
        <span class="tile east">東</span><span class="tile south">南</span>
        <span class="tile west">西</span><span class="tile north">北</span>
      </div>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>누적 순위</h2>
        <span class="hint" id="status">불러오는 중…</span>
      </div>
      <div id="board"><div class="empty">잠시만요…</div></div>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="input.html">＋ 점수입력</a>
      <a class="btn btn-ghost" href="records.html">기록확인</a>
    </div>

    <div class="admin-gate">
      <input type="password" id="admin-pw" placeholder="관리자 비밀번호" autocomplete="off" />
      <button class="btn btn-ghost" id="admin-enter">입장</button>
    </div>
    <p class="admin-note">관리자만 입장하세요.</p>
  </main>

  <script type="module">
    import { onActiveTournament, onGamesByTournament, computeStandings, checkAdminPassword } from './store.js';

    const titleEl = document.getElementById('title');
    const subEl   = document.getElementById('subtitle');
    const board   = document.getElementById('board');
    const status  = document.getElementById('status');
    let gamesUnsub = null;

    function renderStandings(games) {
      status.textContent = '실시간 연결됨';
      const standings = computeStandings(games);
      if (standings.length === 0) {
        board.innerHTML = `<div class="empty"><strong>아직 기록이 없어요</strong>‘점수입력’으로 첫 경기를 등록하세요.</div>`;
        return;
      }
      const body = standings.map(e => `
        <tr>
          <td><span class="rank r${e.rank <= 3 ? e.rank : ''}">${e.rank}</span></td>
          <td>${e.id}</td>
          <td class="num">${e.total.toLocaleString('ko-KR')}</td>
          <td class="num">${e.count}</td>
        </tr>`).join('');
      board.innerHTML = `<table>
        <thead><tr><th style="width:56px">순위</th><th>아이디</th><th class="num">총점</th><th class="num">국수</th></tr></thead>
        <tbody>${body}</tbody></table>`;
    }

    onActiveTournament(t => {
      if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; }
      if (!t) {
        titleEl.textContent = '마작 점수판';
        subEl.textContent = '진행 중인 대회가 없습니다. 관리자에서 대회를 선택하세요.';
        status.textContent = '';
        board.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>관리자 → 대회선택에서 대회를 정하세요.</div>`;
        return;
      }
      titleEl.textContent = t.name;
      subEl.textContent = `${t.startDate} ~ ${t.endDate} · 모든 경기 누적 순위`;
      gamesUnsub = onGamesByTournament(t.id, renderStandings);
    });

    const pw = document.getElementById('admin-pw');
    function enterAdmin() {
      if (checkAdminPassword(pw.value)) {
        sessionStorage.setItem('admin_ok', '1');
        window.location.href = 'admin.html';
      } else { alert('비밀번호가 올바르지 않습니다.'); pw.value = ''; pw.focus(); }
    }
    document.getElementById('admin-enter').addEventListener('click', enterAdmin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') enterAdmin(); });
  </script>
</body>
</html>
