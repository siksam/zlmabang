<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대회 기록 입력 사이트</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 id="title">대회 기록 입력 사이트</h1>
      <p id="subtitle">진행 중인 대회를 불러오는 중…</p>
      <p class="made-by">made by siksam</p>
      <div class="tiles" aria-hidden="true">
        <span class="tile east">東</span><span class="tile south">南</span>
        <span class="tile west">西</span><span class="tile north">北</span>
      </div>
    </header>

    <!-- 타이머: 관리자 모드 + 시간제 대회일 때만 표시 -->
    <section class="card timer-card" id="timer-card" style="display:none;">
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-btns">
        <button class="btn btn-primary" id="t-start">시작</button>
        <button class="btn btn-ghost" id="t-pause">일시정지</button>
        <button class="btn btn-ghost" id="t-reset">리셋</button>
      </div>
      <p class="timer-note" id="timer-note"></p>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>순위</h2>
        <span class="hint" id="status">불러오는 중…</span>
      </div>
      <div id="board"><div class="empty">잠시만요…</div></div>
      <p class="legend" id="legend" style="display:none;">평균=평균승점 · 평순=평균순위 · 팀내=팀 내 등수/인원 · 1·2·3·4=착순 횟수 · 승점차=바로 윗순위와의 차</p>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="input.html">＋ 점수입력</a>
      <a class="btn btn-ghost" href="records.html">기록확인</a>
    </div>

    <!-- 관리자 확인 (잠김) -->
    <div class="admin-gate" id="gate-locked">
      <input type="password" id="admin-pw" placeholder="관리자 비밀번호" autocomplete="off" />
      <button class="btn btn-ghost" id="admin-enter">입장</button>
    </div>
    <!-- 관리자 확인됨 (잠금해제) -->
    <div class="admin-bar" id="gate-unlocked" style="display:none;">
      <span class="admin-badge">✓ 관리자 확인됨</span>
      <a class="btn btn-primary" href="admin.html">관리자 페이지로 이동</a>
      <button class="btn btn-ghost" id="admin-logout">관리자 해제</button>
    </div>
    <p class="admin-note" id="admin-note">관리자만 입장하세요.</p>
  </main>

  <script type="module">
    import { onActiveTournament, onGamesByTournament, computeStandings, computeTeamStandings, computeTeamInfo, fmtPoints, fmt1, fmt2, checkAdminPassword, normalizeAlarms, resolveSound, onSounds } from './store.js';
    import { beep, playSound, speakAlarm, speakEnd, unlockAudioOnGesture } from './audio.js';

    const DEFAULT_TITLE = '대회 기록 입력 사이트';
    const TEAM_BG = ['#eef5ef','#fdeeec','#fbf4e6','#eceff7','#f2edf7','#eaf4f3','#f6f1ea','#edf6ee','#f7eef3','#eef3f7'];
    const COLS = [44,76,56,46,60,56,56,36,36,36,36,48,44];
    const COLGROUP = `<colgroup>${COLS.map(w => `<col style="width:${w}px">`).join('')}</colgroup>`;

    const titleEl = document.getElementById('title');
    const subEl   = document.getElementById('subtitle');
    const board   = document.getElementById('board');
    const status  = document.getElementById('status');
    const legend  = document.getElementById('legend');
    let gamesUnsub = null;
    let currentT = null;

    const rankCell = r => `<td><span class="rank r${r <= 3 ? r : ''}">${r}</span></td>`;
    const placeCells = e => `<td class="c1">${e.p1}</td><td>${e.p2}</td><td>${e.p3}</td><td class="c4">${e.p4}</td>`;
    const gapCell = g => `<td>${g == null ? '-' : fmt1(g)}</td>`;

    function teamModeTable(teams, standings, info, colorMap) {
      const teamHead = `<tr class="hrow">
        <th>순위</th><th class="tl" colspan="3">팀</th><th>승점</th><th>승점차</th><th>평균</th>
        <th class="c1">1</th><th>2</th><th>3</th><th class="c4">4</th><th></th><th>국수</th></tr>`;
      const teamRows = teams.map(e => `<tr style="background:${colorMap[e.team] || 'transparent'}">
        ${rankCell(e.rank)}<td class="tl" colspan="3">${e.team}</td>
        <td>${fmtPoints(e.points)}</td>${gapCell(e.gap)}<td>${fmtPoints(e.avgPoints)}</td>
        ${placeCells(e)}<td></td><td>${e.count}</td></tr>`).join('');
      const indHead = `<tr class="hrow">
        <th>순위</th><th class="tl">아이디</th><th class="tl">팀</th><th>팀내</th><th>승점</th><th>승점차</th><th>평균</th>
        <th class="c1">1</th><th>2</th><th>3</th><th class="c4">4</th><th>평순</th><th>국수</th></tr>`;
      const indRows = standings.map(e => {
        const ti = info[e.id];
        const bg = colorMap[ti ? ti.team : '(미지정)'] || 'transparent';
        return `<tr style="background:${bg}">
          ${rankCell(e.rank)}<td class="tl">${e.id}</td>
          <td class="tl">${ti ? ti.team : '(미지정)'}</td><td>${ti ? ti.teamRank + '/' + ti.teamSize : '-'}</td>
          <td>${fmtPoints(e.points)}</td>${gapCell(e.gap)}<td>${fmtPoints(e.avgPoints)}</td>
          ${placeCells(e)}<td>${fmt2(e.avgRank)}</td><td>${e.count}</td></tr>`;
      }).join('');
      return `<div class="tscroll"><table class="stats fixed">${COLGROUP}<tbody>
        <tr class="secrow"><td colspan="13">팀 순위</td></tr>${teamHead}${teamRows}
        <tr class="secrow"><td colspan="13">개인 순위</td></tr>${indHead}${indRows}
      </tbody></table></div>`;
    }

    function soloTable(standings) {
      const head = `<tr class="hrow"><th>순위</th><th class="tl">아이디</th><th>승점</th><th>승점차</th><th>평균</th>
        <th class="c1">1</th><th>2</th><th>3</th><th class="c4">4</th><th>평순</th><th>국수</th></tr>`;
      const rows = standings.map(e => `<tr>
        ${rankCell(e.rank)}<td class="tl">${e.id}</td>
        <td>${fmtPoints(e.points)}</td>${gapCell(e.gap)}<td>${fmtPoints(e.avgPoints)}</td>
        ${placeCells(e)}<td>${fmt2(e.avgRank)}</td><td>${e.count}</td></tr>`).join('');
      return `<div class="tscroll"><table class="stats"><tbody>${head}${rows}</tbody></table></div>`;
    }

    function renderAll(games, t) {
      status.textContent = '실시간 연결됨';
      const standings = computeStandings(games, t);
      if (standings.length === 0) {
        legend.style.display = 'none';
        board.innerHTML = `<div class="empty"><strong>아직 기록이 없어요</strong>‘점수입력’으로 첫 경기를 등록하세요.</div>`;
        return;
      }
      legend.style.display = 'block';
      if (t.rule === 'team') {
        const teams = computeTeamStandings(standings, t.participants);
        const info = computeTeamInfo(standings, t.participants);
        const colorMap = {};
        teams.forEach((tm, i) => { colorMap[tm.team] = TEAM_BG[i % TEAM_BG.length]; });
        board.innerHTML = teamModeTable(teams, standings, info, colorMap);
      } else {
        board.innerHTML = soloTable(standings);
      }
    }

    /* ---------- 오디오/알람음 ---------- */
    unlockAudioOnGesture();
    let customSounds = [];
    onSounds(list => { customSounds = list; });

    /* ---------- 타이머 (새로고침 유지) ---------- */
    const timerCard = document.getElementById('timer-card');
    const display   = document.getElementById('timer-display');
    const timerNote = document.getElementById('timer-note');
    const fmtClock = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    const TKEY = tid => `mahjong_timer_${tid}`;
    let timer = null, timerIv = null;

    function saveTimer() {
      if (!timer) return;
      localStorage.setItem(TKEY(timer.tid), JSON.stringify({
        total: timer.total, remaining: timer.remaining, running: timer.running,
        endAt: timer.endAt, fired: [...timer.fired], ended: timer.ended,
      }));
    }
    function loadTimer(tid, total, alarms) {
      let s = null;
      try { const raw = localStorage.getItem(TKEY(tid)); if (raw) s = JSON.parse(raw); } catch (e) {}
      if (!s || s.total !== total) {
        timer = { tid, total, remaining: total, running: false, endAt: null, fired: new Set(), ended: false, alarms };
      } else {
        timer = { tid, total: s.total, remaining: s.remaining, running: s.running, endAt: s.endAt,
                  fired: new Set(s.fired || []), ended: !!s.ended, alarms };
        if (timer.running && timer.endAt) timer.remaining = Math.max(0, Math.round((timer.endAt - Date.now()) / 1000));
      }
    }
    function renderTimer() {
      if (!timer) return;
      display.textContent = fmtClock(timer.remaining);
      timerNote.textContent = timer.alarms.length
        ? `알람: 종료 ${timer.alarms.map(a => a.sec / 60).sort((a, b) => b - a).join('·')}분 전`
        : '알람 없음';
    }
    function tickTimer() {
      if (!timer || !timer.running) return;
      timer.remaining = Math.max(0, Math.round((timer.endAt - Date.now()) / 1000));
      for (const a of timer.alarms) {
        if (timer.remaining <= a.sec && !timer.fired.has(a.sec)) {
          timer.fired.add(a.sec);
          if (!a.soundId || a.soundId === 'tts') speakAlarm(a.sec / 60);
          else playSound(resolveSound(a.soundId, customSounds));
          saveTimer();
        }
      }
      if (timer.remaining <= 0 && !timer.ended) {
        timer.ended = true; timer.running = false; timer.endAt = null; speakEnd(); saveTimer();
      }
      renderTimer();
    }
    function setupTimer(t) {
      const isAdmin = sessionStorage.getItem('admin_ok') === '1';
      if (timerIv) { clearInterval(timerIv); timerIv = null; }
      if (!isAdmin || !t || !t.timed) { timerCard.style.display = 'none'; timer = null; return; }
      timerCard.style.display = 'block';
      const alarms = normalizeAlarms(t.alarms).map(a => ({ sec: a.min * 60, soundId: a.soundId }));
      loadTimer(t.id, (t.minutes || 0) * 60, alarms);
      renderTimer();
      timerIv = setInterval(tickTimer, 250);
    }
    document.getElementById('t-start').addEventListener('click', () => {
      if (!timer || timer.running) return;
      if (timer.remaining <= 0) { timer.remaining = timer.total; timer.fired = new Set(); timer.ended = false; }
      timer.running = true; timer.endAt = Date.now() + timer.remaining * 1000;
      saveTimer(); renderTimer();
    });
    document.getElementById('t-pause').addEventListener('click', () => {
      if (!timer || !timer.running) return;
      timer.remaining = Math.max(0, Math.round((timer.endAt - Date.now()) / 1000));
      timer.running = false; timer.endAt = null; saveTimer(); renderTimer();
    });
    document.getElementById('t-reset').addEventListener('click', () => {
      if (!timer) return;
      timer.running = false; timer.endAt = null; timer.remaining = timer.total;
      timer.fired = new Set(); timer.ended = false; saveTimer(); renderTimer();
    });

    /* ---------- 관리자 확인 UI ---------- */
    const gateLocked = document.getElementById('gate-locked');
    const gateUnlocked = document.getElementById('gate-unlocked');
    const adminNote = document.getElementById('admin-note');
    const pw = document.getElementById('admin-pw');

    function applyAdminUI() {
      const isAdmin = sessionStorage.getItem('admin_ok') === '1';
      gateLocked.style.display = isAdmin ? 'none' : 'flex';
      gateUnlocked.style.display = isAdmin ? 'flex' : 'none';
      adminNote.textContent = isAdmin ? '관리자 모드 — 타이머가 표시됩니다.' : '관리자만 입장하세요.';
      setupTimer(currentT);
    }
    function enterAdmin() {
      if (checkAdminPassword(pw.value)) { sessionStorage.setItem('admin_ok', '1'); pw.value = ''; applyAdminUI(); }
      else { alert('비밀번호가 올바르지 않습니다.'); pw.value = ''; pw.focus(); }
    }
    document.getElementById('admin-enter').addEventListener('click', enterAdmin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') enterAdmin(); });
    document.getElementById('admin-logout').addEventListener('click', () => { sessionStorage.removeItem('admin_ok'); applyAdminUI(); });

    /* ---------- 대회 구독 ---------- */
    onActiveTournament(t => {
      currentT = t;
      if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; }
      setupTimer(t);
      if (!t) {
        titleEl.textContent = DEFAULT_TITLE; document.title = DEFAULT_TITLE;
        subEl.textContent = '진행 중인 대회가 없습니다. 관리자에서 대회를 선택하세요.';
        status.textContent = ''; legend.style.display = 'none';
        board.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>관리자 → 대회선택에서 대회를 정하세요.</div>`;
        return;
      }
      titleEl.textContent = t.name; document.title = t.name;
      const rule = t.rule === 'team' ? '팀전' : '개인전';
      const time = t.timed ? `시간제(${t.minutes || 0}분)` : '시간제 없음';
      const uma = `${t.uma1 ?? 0}/${t.uma2 ?? 0}`;
      subEl.textContent = `${rule} · ${time} · ${uma} · ${t.startDate} ~ ${t.endDate}`;
      gamesUnsub = onGamesByTournament(t.id, games => renderAll(games, t));
    });

    applyAdminUI();
  </script>
</body>
</html>
