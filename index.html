<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마작 점수판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">東南西北 · 누적 점수판</p>
      <h1 id="title">마작 점수판</h1>
      <p id="subtitle">진행 중인 대회를 불러오는 중…</p>
      <div class="tiles" aria-hidden="true">
        <span class="tile east">東</span><span class="tile south">南</span>
        <span class="tile west">西</span><span class="tile north">北</span>
      </div>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>순위</h2>
        <span class="hint" id="status">불러오는 중…</span>
      </div>
      <div id="board"><div class="empty">잠시만요…</div></div>
      <p class="legend" id="legend" style="display:none;">평균=평균승점 · 평순=평균순위 · 팀내=팀 내 등수/인원 · 1·2·3·4=착순 횟수 · 승점차=바로 윗순위와의 차</p>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="input.html">＋ 점수입력</a>
      <a class="btn btn-ghost" href="records.html">기록확인</a>
    </div>

    <div class="admin-gate">
      <input type="password" id="admin-pw" placeholder="관리자 비밀번호" autocomplete="off" />
      <button class="btn btn-ghost" id="admin-enter">입장</button>
    </div>
    <p class="admin-note">관리자만 입장하세요.</p>
  </main>

  <script type="module">
    import { onActiveTournament, onGamesByTournament, computeStandings, computeTeamStandings, computeTeamInfo, fmtPoints, fmt1, fmt2, checkAdminPassword } from './store.js';

    const titleEl = document.getElementById('title');
    const subEl   = document.getElementById('subtitle');
    const board   = document.getElementById('board');
    const status  = document.getElementById('status');
    const legend  = document.getElementById('legend');
    let gamesUnsub = null;

    const rankCell = r => `<td><span class="rank r${r <= 3 ? r : ''}">${r}</span></td>`;
    const placeCells = e => `<td class="c1">${e.p1}</td><td>${e.p2}</td><td>${e.p3}</td><td class="c4">${e.p4}</td>`;
    const gapCell = g => `<td>${g == null ? '-' : fmt1(g)}</td>`;

    function teamTable(teams) {
      const head = `<tr><th>순위</th><th class="tl">팀</th><th>승점</th><th>승점차</th><th>평균</th>
        <th class="c1">1</th><th>2</th><th>3</th><th class="c4">4</th><th>국수</th></tr>`;
      const body = teams.map(e => `<tr>
        ${rankCell(e.rank)}<td class="tl">${e.team}</td>
        <td>${fmtPoints(e.points)}</td>${gapCell(e.gap)}<td>${fmtPoints(e.avgPoints)}</td>
        ${placeCells(e)}<td>${e.count}</td></tr>`).join('');
      return `<div class="tscroll"><table class="stats"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
    }

    function indivTable(standings, teamInfo) {
      const teamMode = !!teamInfo;
      const head = `<tr><th>순위</th><th class="tl">아이디</th>
        ${teamMode ? '<th class="tl">팀</th><th>팀내</th>' : ''}
        <th>승점</th><th>승점차</th><th>평균</th>
        <th class="c1">1</th><th>2</th><th>3</th><th class="c4">4</th><th>평순</th><th>국수</th></tr>`;
      const body = standings.map(e => {
        const ti = teamMode ? teamInfo[e.id] : null;
        const teamCols = teamMode
          ? `<td class="tl">${ti ? ti.team : '(미지정)'}</td><td>${ti ? ti.teamRank + '/' + ti.teamSize : '-'}</td>`
          : '';
        return `<tr>
          ${rankCell(e.rank)}<td class="tl">${e.id}</td>${teamCols}
          <td>${fmtPoints(e.points)}</td>${gapCell(e.gap)}<td>${fmtPoints(e.avgPoints)}</td>
          ${placeCells(e)}<td>${fmt2(e.avgRank)}</td><td>${e.count}</td></tr>`;
      }).join('');
      return `<div class="tscroll"><table class="stats"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
    }

    function renderAll(games, t) {
      status.textContent = '실시간 연결됨';
      const standings = computeStandings(games, t);
      if (standings.length === 0) {
        legend.style.display = 'none';
        board.innerHTML = `<div class="empty"><strong>아직 기록이 없어요</strong>‘점수입력’으로 첫 경기를 등록하세요.</div>`;
        return;
      }
      legend.style.display = 'block';
      let html = '';
      if (t.rule === 'team') {
        const teams = computeTeamStandings(standings, t.participants);
        const info = computeTeamInfo(standings, t.participants);
        html += `<div class="subhead">팀 순위</div>` + teamTable(teams);
        html += `<div class="subhead">개인 순위</div>` + indivTable(standings, info);
      } else {
        html += indivTable(standings, null);
      }
      board.innerHTML = html;
    }

    onActiveTournament(t => {
      if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; }
      if (!t) {
        titleEl.textContent = '마작 점수판';
        subEl.textContent = '진행 중인 대회가 없습니다. 관리자에서 대회를 선택하세요.';
        status.textContent = ''; legend.style.display = 'none';
        board.innerHTML = `<div class="empty"><strong>진행 중인 대회 없음</strong>관리자 → 대회선택에서 대회를 정하세요.</div>`;
        return;
      }
      titleEl.textContent = t.name;
      subEl.textContent = `${t.startDate} ~ ${t.endDate} · 승점 기준 누적 순위`;
      gamesUnsub = onGamesByTournament(t.id, games => renderAll(games, t));
    });

    const pw = document.getElementById('admin-pw');
    function enterAdmin() {
      if (checkAdminPassword(pw.value)) { sessionStorage.setItem('admin_ok', '1'); window.location.href = 'admin.html'; }
      else { alert('비밀번호가 올바르지 않습니다.'); pw.value = ''; pw.focus(); }
    }
    document.getElementById('admin-enter').addEventListener('click', enterAdmin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') enterAdmin(); });
  </script>
</body>
</html>
