<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마작 점수판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <p class="eyebrow">東南西北 · 점수판</p>
      <h1>마작 점수판</h1>
      <p>실시간 공유 결과입니다. 누가 점수를 저장하면 이 화면에 바로 반영됩니다.</p>
      <div class="tiles" aria-hidden="true">
        <span class="tile east">東</span>
        <span class="tile south">南</span>
        <span class="tile west">西</span>
        <span class="tile north">北</span>
      </div>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>결과</h2>
        <span class="hint" id="status">불러오는 중…</span>
      </div>
      <div id="board">
        <div class="empty">잠시만요, 데이터를 불러오고 있어요.</div>
      </div>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="input.html">＋ 점수입력</a>
    </div>
  </main>

  <script type="module">
    import { onScores, computeRanks } from './store.js';

    const SEAT_META = {
      '동': { han: '東', cls: 'east'  },
      '남': { han: '南', cls: 'south' },
      '서': { han: '西', cls: 'west'  },
      '북': { han: '北', cls: 'north' },
    };

    const board  = document.getElementById('board');
    const status = document.getElementById('status');

    function hasAnyScore(rows) {
      return rows.some(r => r.score !== null && r.score !== '');
    }

    function render(rows) {
      status.textContent = '실시간 연결됨';

      if (!hasAnyScore(rows)) {
        board.innerHTML = `
          <div class="empty">
            <strong>아직 입력된 점수가 없어요</strong>
            아래 ‘점수입력’을 눌러 4명의 점수를 등록하세요.
          </div>`;
        return;
      }

      const ranks = computeRanks(rows);
      const total = rows.reduce((s, r) =>
        s + (r.score === null || r.score === '' ? 0 : Number(r.score)), 0);

      const body = rows.map(r => {
        const meta = SEAT_META[r.pos] || { han: '', cls: '' };
        const rank = ranks.get(r);
        const rankHtml = rank
          ? `<span class="rank r${rank}">${rank}</span>`
          : '<span class="rank">–</span>';
        const id = r.id ? r.id : '<span class="id-empty">미입력</span>';
        const score = (r.score === null || r.score === '')
          ? '<span class="id-empty">–</span>'
          : Number(r.score).toLocaleString('ko-KR');
        return `
          <tr>
            <td>${rankHtml}</td>
            <td><span class="seat seat-${meta.cls}"><span class="dot"></span>${meta.han} ${r.pos}</span></td>
            <td>${id}</td>
            <td class="num">${score}</td>
          </tr>`;
      }).join('');

      board.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:56px">순위</th>
              <th>위치</th>
              <th>아이디</th>
              <th class="num">점수</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
          <tfoot>
            <tr>
              <td colspan="3">합계</td>
              <td class="num">${total.toLocaleString('ko-KR')}</td>
            </tr>
          </tfoot>
        </table>`;
    }

    // 실시간 구독 시작
    onScores(render);
  </script>
</body>
</html>
